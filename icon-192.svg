<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A8A"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:0.95"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>

  <!-- Wallet body -->
  <rect x="34" y="72" width="124" height="80" rx="12" fill="url(#shield)"/>
  <!-- Wallet flap -->
  <rect x="34" y="56" width="124" height="32" rx="10" fill="white" opacity="0.9"/>
  <!-- Card slot line -->
  <rect x="34" y="80" width="124" height="3" fill="#C7D2FE" opacity="0.6"/>

  <!-- Coin pocket -->
  <rect x="118" y="92" width="28" height="30" rx="8" fill="#1E3A8A" opacity="0.15"/>
  <circle cx="132" cy="107" r="9" fill="#1E3A8A" opacity="0.25"/>

  <!-- Dollar sign -->
  <text x="96" y="50" text-anchor="middle"
        font-family="Georgia, serif" font-weight="700"
        font-size="26" fill="#1E3A8A" opacity="0.85">SafeSpend</text>

  <!-- $ symbol on wallet -->
  <text x="72" y="122" text-anchor="middle"
        font-family="Georgia, serif" font-weight="900"
        font-size="34" fill="#1E3A8A">$</text>
</svg>
